<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>東京賞櫻 2026 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-image: url('https://images.unsplash.com/photo-1532236204992-f5e85c0142ce?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .header-curve { border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .fade-enter-active, .fade-leave-active { transition: opacity 0.8s; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
        .animate-fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-600 overflow-x-hidden">

    <div id="app" class="max-w-md mx-auto bg-white/90 backdrop-blur-sm min-h-screen shadow-2xl relative pb-24">
        
        <header class="relative z-10">
            <div class="h-[170px] w-full header-curve overflow-hidden relative shadow-md" style="background-color: #ffffff;">
                <img :src="headerImage" style="background-color: #ffffff;" class="w-full h-full object-contain object-center opacity-90 transition duration-1000 hover:scale-105">
                <div class="absolute bottom-6 left-6 text-slate-700">
                    <h1 class="text-2xl font-bold tracking-widest drop-shadow-sm">東京 2026</h1>
                    <p class="text-xs font-medium tracking-wider drop-shadow-sm opacity-80">櫻花與樂園之旅 🌸</p>
                </div>
                <div class="absolute top-4 right-4 bg-slate-100/80 backdrop-blur-md text-slate-600 text-[10px] px-3 py-1 rounded-full flex items-center border border-slate-200 shadow-sm">
                    <div class="w-2 h-2 rounded-full mr-2" :class="dbConnected ? 'bg-green-400' : 'bg-red-400 animate-pulse'"></div>
                    {{ dbConnected ? '已連線' : '連線中' }}
                </div>
            </div>
        </header>

        <div class="fixed bottom-6 left-1/2 transform -translate-x-1/2 flex space-x-1 z-50 bg-white/90 backdrop-blur-md px-3 py-2 rounded-full shadow-2xl border border-white/50 ring-1 ring-pink-100">
            <button v-for="tab in ['schedule', 'food', 'shopping', 'expense', 'note']" @click="switchTab(tab)" 
                    :class="currentTab === tab ? 'bg-gradient-to-tr from-pink-400 to-pink-500 text-white shadow-lg scale-110' : 'text-slate-400 hover:text-pink-400'" 
                    class="w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center transition-all duration-300">
                <i :class="getTabIcon(tab)" class="text-lg"></i>
            </button>
        </div>

        <main class="relative z-0 -mt-4 pt-4 px-4 min-h-[500px]">

            <div v-if="currentTab === 'schedule'">
                 <div class="flex overflow-x-auto space-x-2 pb-2 hide-scrollbar mb-2">
                    <div v-for="(day, index) in scheduleData" :key="index" @click="selectedDayIndex = index"
                         :class="selectedDayIndex === index ? 'bg-gradient-to-b from-pink-400 to-pink-500 text-white ring-2 ring-pink-200 shadow-md transform -translate-y-1' : 'bg-white text-slate-400 border border-pink-100'"
                         class="flex-shrink-0 w-14 h-16 rounded-xl flex flex-col items-center justify-center cursor-pointer transition-all duration-300">
                        <span class="text-[10px] font-medium opacity-80">{{ day.weekday }}</span>
                        <span class="text-lg font-bold font-mono">{{ day.date }}</span>
                        <span class="text-[9px] opacity-60">D{{ index + 1 }}</span>
                    </div>
                    
                    <div @click="selectedDayIndex = 'map'"
                         :class="selectedDayIndex === 'map' ? 'bg-gradient-to-b from-pink-400 to-pink-500 text-white ring-2 ring-pink-200 shadow-md transform -translate-y-1' : 'bg-white text-slate-400 border border-pink-100'"
                         class="flex-shrink-0 w-14 h-16 rounded-xl flex flex-col items-center justify-center cursor-pointer transition-all duration-300">
                        <span class="text-[10px] font-medium opacity-80">All</span>
                        <span class="text-xl font-bold"><i class="fa-solid fa-map"></i></span>
                        <span class="text-[9px] opacity-60">行程圖</span>
                    </div>
                </div>

                <div v-if="selectedDayIndex === 'map'" class="animate-fade-in mt-4">
                    <img src="YOUR_IMAGE_URL_HERE" alt="東京行程總覽圖" class="w-full h-auto rounded-xl shadow-sm border border-slate-100">
                    <p class="text-center text-xs text-slate-400 mt-3">💡 點擊上方的日期即可返回每日行程表</p>
                </div>

                <div v-else class="animate-fade-in">
                    <div class="bg-gradient-to-r from-blue-400 to-pink-300 text-white rounded-2xl p-4 mb-4 shadow-sm flex justify-between items-center relative overflow-hidden min-h-[90px]">
                        <div class="relative z-10">
                            <div class="text-xs opacity-90 flex items-center"><i class="fa-solid fa-location-dot mr-1"></i>{{ currentSchedule.location }} <span class="ml-2 text-[10px] opacity-70 border border-white/30 px-1 rounded">即時</span></div>
                            <div v-if="weatherLoading" class="mt-1 text-sm opacity-80">天氣載入中...</div>
                            <div v-else><div class="text-2xl font-bold mt-1">{{ currentWeather.temp }}°C <span class="text-sm font-normal">{{ currentWeather.desc }}</span></div></div>
                        </div>
                        <i :class="currentWeather.icon" class="text-4xl opacity-80 relative z-10 drop-shadow-md"></i>
